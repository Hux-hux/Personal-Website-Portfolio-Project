<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./resources/css/styles.css">
    <title>Portfolio Website</title>
</head>
<body>
    <header>
        <h1>Rock Paper Scissors</h1>
    </header>
    
    <main>
        <div class="rules main">
            <h2 id="clickable">SEE THE GAME RULES</h2>
            <section id="scheme">
                <img src="./resources/images/rules.png" alt="">
            </section>
        </div>

        <div class="game main">
            <form>
                <br>
                <h3 id="game">PICK TO PLAY:</h3>
                <section class="list">
                    <input id="rock" type="radio" name="choice" value="ROCK" required>
                    <label for="rock">ROCK</label>

                    <input id="paper" type="radio" name="choice" value="PAPER" required>
                    <label for="paper">PAPER</label>

                    <input id="scissors" type="radio" name="choice" value="SCISSORS" required>
                    <label for="scissors">SCISSORS</label>
                </section>
                <br>
                <section class="submission">
                    <input type="submit" value="GO!">
                </section>
            </form>
        </div>
    </main>

    <footer>


    </footer>
    <script src="./index.js"></script>
</body>
</html>
